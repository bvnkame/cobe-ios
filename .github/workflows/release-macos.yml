name: Release macOS DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label (e.g. v1.0.0). Used for DMG filename only — no tag created.'
        required: true
        default: 'v0.0.0-dev'

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          ls /Applications | grep -i xcode || true
          sudo xcode-select -s "/Applications/Xcode_15.4.app/Contents/Developer" || \
          sudo xcode-select -s "/Applications/Xcode.app/Contents/Developer"
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF="${{ github.event.inputs.version }}"
          else
            REF="${GITHUB_REF_NAME}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Building version: $REF"

      - name: Build DMG
        env:
          GITHUB_REF_NAME: ${{ steps.ver.outputs.ref }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          ./scripts/build-mac-dmg.sh "${{ steps.ver.outputs.ref }}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: CobeDemo-${{ steps.ver.outputs.ref }}
          path: dist/*.dmg
          if-no-files-found: error

      - name: Create / update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*.dmg
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
