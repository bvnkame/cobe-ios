name: Create Release Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to create (must start with v, e.g. v1.0.0). Pushing it triggers the macOS DMG release workflow.'
        required: true

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag format
        run: |
          TAG="${{ github.event.inputs.version }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9._-]+)?$ ]]; then
            echo "Tag must match vMAJOR.MINOR.PATCH[-suffix] (got: $TAG)"; exit 1
          fi
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"; exit 1
          fi

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create + push tag
        run: |
          TAG="${{ github.event.inputs.version }}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
